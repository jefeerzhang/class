<header>聚类分析（Cluster Analysis）</header>
<h2 id="%E8%81%9A%E7%B1%BB%E5%88%86%E6%9E%90%E7%9A%84%E5%AE%9A%E4%B9%89">聚类分析的定义</h2>
<p><strong>聚类分析（Cluster Analysis）<strong>是一种</strong>无监督学习</strong>方法，其目标是：</p>
<blockquote>
<p>将一组数据对象划分为若干个子集（称为&quot;<strong>簇</strong>&quot;），使得<strong>同一簇内</strong>的对象彼此<strong>相似</strong>，而<strong>不同簇之间</strong>的对象<strong>相异</strong>。</p>
</blockquote>
<p><strong>核心思想</strong>：&quot;物以类聚，人以群分&quot;</p>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="%E9%80%9A%E4%BF%97%E7%90%86%E8%A7%A3%E6%B0%B4%E6%9E%9C%E5%88%86%E7%B1%BB">通俗理解：水果分类</h2>
<p>想象你有一堆水果，但你不知道它们的种类：</p>
<ul>
<li>观察特征：颜色、大小、形状、重量</li>
<li>自然分组：苹果一堆、香蕉一堆、橙子一堆</li>
</ul>
<p><strong>聚类就是让数据&quot;自己说话&quot;，自动发现内在结构！</strong></p>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="%E8%81%9A%E7%B1%BB-vs-%E5%88%86%E7%B1%BB">聚类 vs 分类</h2>
<table>
<thead>
<tr>
<th>维度</th>
<th>聚类（Clustering）</th>
<th>分类（Classification）</th>
</tr>
</thead>
<tbody>
<tr>
<td>学习类型</td>
<td>无监督学习</td>
<td>有监督学习</td>
</tr>
<tr>
<td>训练数据</td>
<td>无标签数据</td>
<td>有标签数据</td>
</tr>
<tr>
<td>目标</td>
<td>发现数据结构</td>
<td>预测新数据类别</td>
</tr>
<tr>
<td>先验知识</td>
<td>不需要知道类别数</td>
<td>需要预先知道类别</td>
</tr>
</tbody>
</table>
<p><strong>关键区别</strong>：</p>
<ul>
<li>分类：&quot;教机器认识已知类别&quot; → 告诉机器什么是苹果、什么是香蕉</li>
<li>聚类：&quot;让机器自己发现类别&quot; → 只给一堆水果，让机器自己找出分组规律</li>
</ul>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="%E8%81%9A%E7%B1%BB%E7%9A%84%E6%A0%B8%E5%BF%83%E7%9B%AE%E6%A0%87">聚类的核心目标</h2>
<p><strong>最大化簇内相似度，最小化簇间相似度</strong></p>
<ul>
<li><strong>簇内相似度高</strong>：同一簇内的数据点彼此距离较近</li>
<li><strong>簇间相似度低</strong>：不同簇的数据点彼此距离较远</li>
</ul>
<p><strong>好的聚类 = 组内&quot;抱团紧密&quot;，组间&quot;分离清楚&quot;</strong></p>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="%E4%B8%BA%E4%BB%80%E4%B9%88%E9%9C%80%E8%A6%81%E5%A4%9A%E7%A7%8D%E8%B7%9D%E7%A6%BB%E5%BA%A6%E9%87%8F">为什么需要多种距离度量？</h2>
<p><strong>核心问题</strong>：不同的距离度量关注数据的不同方面。</p>
<p><strong>例子</strong>：评价两个学生是否&quot;相似&quot;</p>
<ul>
<li>学生A：数学100分，语文100分</li>
<li>学生B：数学60分，语文60分</li>
<li>学生C：数学100分，语文60分</li>
</ul>
<table>
<thead>
<tr>
<th>关注点</th>
<th>结果</th>
<th>距离类型</th>
</tr>
</thead>
<tbody>
<tr>
<td>绝对水平</td>
<td>A和B差异大（总分差80分）</td>
<td>欧氏距离</td>
</tr>
<tr>
<td>学科倾向</td>
<td>A和C都是&quot;偏数学&quot;类型</td>
<td>余弦相似度</td>
</tr>
</tbody>
</table>
<p><strong>选择不同的距离，会得到完全不同的聚类结果！</strong></p>

ong>为什么叫&quot;曼哈顿&quot;？</strong></p>

<p>从A到B：欧氏距离是直线，曼哈顿距离是沿街走的步数之和。</p>
<p><strong>区别</strong>：欧氏距离对大差异更敏感（因为要平方），曼哈顿距离对异常值更稳健。</p>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="%E4%BD%99%E5%BC%A6%E7%9B%B8%E4%BC%BC%E5%BA%A6%E7%AE%AD%E5%A4%B4%E7%B1%BB%E6%AF%94">余弦相似度：箭头类比</h2>
<p>把每篇文章看作一个箭头（向量）：</p>
<ul>
<li>箭头的<strong>方向</strong> = 文章的&quot;主题倾向&quot;</li>
<li>箭头的<strong>长度</strong> = 文章的&quot;篇幅大小&quot;</li>
</ul>
<p><strong>余弦相似度只看&quot;箭头指向是否相同&quot;，不管&quot;箭头有多长&quot;。</strong></p>
<p><strong>适用场景</strong>：</p>
<ul>
<li>文本挖掘（文档相似度比较）</li>
<li>推荐系统（用户偏好相似度）</li>
<li>当关注方向/模式而非大小时</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-class="lead" data-paginate="true" data-header="聚类分析（Cluster Analysis）" data-style="section {

<header>聚类分析（Cluster Analysis）</header>
<h2 id="16-%E6%95%B0%E6%8D%AE%E6%A0%87%E5%87%86%E5%8C%96">1.6 数据标准化</h2>
<p><strong>为什么需要标准化？</strong></p>
<p>因为不同的特征可能有不同的量纲和取值范围。如果不做标准化，数值范围大的特征会在距离计算中占据主导地位。</p>
<p><strong>极端例子</strong>：年龄 vs 年收入</p>
<table>
<thead>
<tr>
<th>客户</th>
<th>年龄</th>
<th>年收入（元）</th>
</tr>
</thead>
<tbody>
<tr>
<td>A</td>
<td>25</td>
<td>8,000</td>
</tr>
<tr>
<td>B</td>
<td>30</td>
<td>12,000</td>
</tr>
<tr>
<td>C</td>
<td>45</td>
<td>500,000</td>
</tr>
</tbody>
</table>
<ul>
<li>年龄差异（5岁、15岁）被收入差异（几千元 vs 几十万元）<strong>完全淹没</strong>！</li>
<li>&quot;收入差异&quot;贡献了99.999%的距离，&quot;年龄差异&quot;只占0.001%</li>
</ul>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="%E6%A0%87%E5%87%86%E5%8C%96%E8%AE%A9%E6%89%80%E6%9C%89%E4%BA%BA%E7%AB%99%E5%9C%A8%E5%90%8C%E4%B8%80%E8%B5%B7%E8%B7%91%E7%BA%BF">标准化：让所有人站在同一起跑线</h2>
<p><strong>标准化之后</strong>，每个特征都变成&quot;均值为0，标准差为1&quot;：</p>
<ul>
<li>年龄：25岁、30岁、45岁 → -1.0, -0.5, +1.5（标准分）</li>
<li>收入：8000、12000、500000 → -0.7, -0.7, +1.4（标准分）</li>
</ul>
<p>现在算距离，年龄和收入各贡献一半，两个特征都有发言权。</p>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="17-%E7%B0%87%E7%9A%84%E5%BD%A2%E7%8A%B6%E4%B8%8E%E7%B1%BB%E5%9E%8B">1.7 簇的形状与类型</h2>
<p><strong>为什么簇的形状很重要？</strong></p>
<p>不同的聚类算法基于不同的假设来定义&quot;什么是相似的点&quot;。用错误的算法分析数据，就像用圆形的模具去切方形的饼干——结果必然不理想。</p>
</section>

<h2 id="%E7%90%83%E7%8A%B6%E7%B0%87spherical-clusters">球状簇（Spherical Clusters）</h2>
<p>簇内的点围绕一个中心均匀分布，呈现圆形或球形。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>        ●●●●●
      ●●      ●●
     ●          ●
     ●    ●     ●   ← 中心点（质心）
     ●          ●
      ●●      ●●
        ●●●●●
</code></pre>
<p><strong>K-Means 只能发现球状簇</strong>，因为它用质心代表簇，本质是在画&quot;直线切割&quot;的Voronoi图。</p>

<h2 id="%E4%BB%BB%E6%84%8F%E5%BD%A2%E7%8A%B6%E7%B0%87">任意形状簇</h2>
<p>簇的形状可以是任意的——长条形、月牙形、环形、S形等。</p>
<p><strong>DBSCAN 可以发现任意形状的簇</strong>：</p>
<ul>
<li>不依赖&quot;质心&quot;，而是看&quot;周围点的密度&quot;</li>
<li>只要点与点之间&quot;够近&quot;，就可以连成一片</li>
<li>像&quot;顺藤摸瓜&quot;一样，沿着高密度区域扩展</li>
</ul>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="dbscan-vs-k-means%E6%89%BE%E4%BA%BA%E7%B1%BB%E6%AF%94">DBSCAN vs K-Means：找人类比</h2>
<p>想象你在一个广场上找人：</p>
<table>
<thead>
<tr>
<th>方式</th>
<th>做法</th>
<th>结果</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>K-Means</strong></td>
<td>每个人站在一个&quot;标杆&quot;附近，标杆在哪你就在哪</td>
<td>只能识别圆形区域</td>
</tr>
<tr>
<td><strong>DBSCAN</strong></td>
<td>你拉着朋友的手，朋友再拉他们朋友的手，最后连成一片</td>
<td>可以识别任意形状</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-class="lead" data-paginate="true" data-header="聚类分析（Cluster Analysis）" data-style="section {

<header>聚类分析（Cluster Analysis）</header>
<h2 id="%E5%B1%82%E6%AC%A1%E7%BB%93%E6%9E%84%E7%B0%87">层次结构簇</h2>
<p>簇之间存在嵌套的层次关系——大簇中包含小簇。</p>
<p><strong>生物分类学</strong>：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>所有动物
├── 脊椎动物
│   ├── 哺乳动物
│   │   ├── 灵长类（人、猩猩）
│   │   └── 食肉类（猫、狗、熊）
│   └── 鸟类
└── 无脊椎动物
</code></pre>
<p><strong>层次聚类</strong>专门为此设计，可以在不同层次上&quot;切一刀&quot;，得到不同粒度的分类。</p>
</section>

</ul>
</li>
</ol>
<p><strong>建议</strong>：如果不确定，优先使用 DBSCAN 或层次聚类。</p>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="k-means-%E7%AE%97%E6%B3%95%E6%80%9D%E6%83%B3">K-Means 算法思想</h2>
<p><strong>核心思想</strong>：&quot;找中心、分阵营、再找中心、再分阵营……循环直到稳定&quot;</p>
<ul>
<li><strong>K</strong>：表示我们想要将数据分成 K 个簇</li>
<li><strong>Means</strong>：表示用每个簇的&quot;均值&quot;（中心点）来代表这个簇</li>
</ul>
<p><strong>直观示例</strong>：老师把30个学生分成3个小组</p>
<ol>
<li>随机选3个学生作为&quot;标杆&quot;</li>
<li>每个学生站到离自己身高最接近的&quot;标杆&quot;那边</li>
<li>每个小组重新计算平均身高，选出最接近平均值的学生做新&quot;标杆&quot;</li>
<li>重复2-3步，直到分组稳定</li>
</ol>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="k-means-%E7%AE%97%E6%B3%95%E6%AD%A5%E9%AA%A4">K-Means 算法步骤</h2>
<ol>
<li><strong>初始化</strong>：随机选择 K 个点作为初始簇中心（质心）</li>
<li><strong>分配步骤</strong>：每个点计算到 K 个质心的距离，分配给最近的质心</li>
<li><strong>更新步骤</strong>：重新计算每个簇的质心（该簇所有点的均值）</li>
<li><strong>迭代</strong>：重复步骤2和3，直到质心不再变化</li>
</ol>
<p><strong>目标函数</strong>：最小化 SSE（簇内平方和）</p>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="k-means-%E4%BC%98%E7%BC%BA%E7%82%B9">K-Means 优缺点</h2>
<p><strong>优点</strong>：</p>
<ul>
<li>简单易懂，易于实现</li>
<li>计算效率高，适合大数据集</li>
<li>对球状簇效果好</li>
</ul>
<p><strong>缺点</strong>：</p>
<ul>
<li>需要预先指定 K 值</li>
<li>对初始值敏感</li>
<li>对异常值敏感</li>
<li>只能发现球状簇</li>
<li>不适合类别不平衡数据</li>
</ul>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="k-%E5%80%BC%E9%80%89%E6%8B%A9%E6%96%B9%E6%B3%95%E8%82%98%E9%83%A8%E6%B3%95%E5%88%99">K 值选择方法：肘部法则</h2>
<p><strong>通俗理解</strong>：找一个&quot;性价比最高&quot;的 K 值——再多分一类，也分不出什么新花样了。</p>
<p><strong>切蛋糕类比</strong>：</p>
<ul>
<li>K=1：整个蛋糕一块，SSE 很大</li>
<li>K=2：切成两半，SSE 大幅下降</li>
<li>K=3：切成三块，SSE 又下降一些</li>
<li>K=4：SSE 下降很少了</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>SSE
 ↑
 │●
 │  ●
 │    ●   ← 肘部！再往右，下降变缓
 │      ●
 │        ●──●──●
 └───────────────→ K
   1  2  3  4  5
</code></pre>
<p><strong>在肘部停</strong>：再切下去，每块蛋糕太小，没什么意义了。</p>
</section>

<p>想象班里来了8个新同学，按&quot;相似度&quot;逐步抱团：</p>
<ul>
<li><strong>第一步</strong>：各自为营（8组）</li>
<li><strong>第二步</strong>：找最像的两个人抱团 → 小明和小华都是学霸 → 组队</li>
<li><strong>第三步</strong>：组与组再合并 → 男生组合并、女生组合并</li>
<li><strong>第四步</strong>：继续合并 → 全班成一个大组</li>
</ul>
<p><strong>这就是凝聚型层次聚类</strong>：从个体开始，逐步合并最相似的群体，最终形成&quot;家族树&quot;。</p>
</section>

<h2 id="23-dbscan-%E5%AF%86%E5%BA%A6%E8%81%9A%E7%B1%BB">2.3 DBSCAN 密度聚类</h2>
<p><strong>核心思想</strong>：&quot;簇是数据空间中密度较高的区域，被密度较低的区域分隔&quot;</p>
<p><strong>与前两种算法不同</strong>：</p>
<ul>
<li>可以发现<strong>任意形状的簇</strong></li>
<li>能够识别<strong>噪声点</strong>（离群点）</li>
<li>不需要预先知道簇的数量</li>
</ul>

<p><strong>关键洞察</strong>：DBSCAN 不看&quot;离市中心有多远&quot;，而是看&quot;你周围有多少人&quot;。</p>
</section>

<h2 id="dbscan%E6%A0%B8%E5%BF%83%E7%9B%B4%E8%A7%89%E5%AF%B9%E6%AF%94">DBSCAN：核心直觉对比</h2>
<table>
<thead>
<tr>
<th>算法</th>
<th>核心问题</th>
<th>类比</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>K-Means</strong></td>
<td>&quot;你离哪个中心最近？&quot;</td>
<td>选班长，站队</td>
</tr>
<tr>
<td><strong>层次聚类</strong></td>
<td>&quot;谁和谁是近亲？&quot;</td>
<td>画族谱</td>
</tr>
<tr>
<td><strong>DBSCAN</strong></td>
<td>&quot;你周围人多不多？&quot;</td>
<td>看人气</td>
</tr>
</tbody>
</table>
<p><strong>通俗总结</strong>：DBSCAN 就像一个&quot;人气探测器&quot;</p>
<ul>
<li>你周围人多 → 你属于某个&quot;人气聚集区&quot;（簇）</li>
<li>你周围人少 → 你是&quot;孤家寡人&quot;（噪声点）</li>
</ul>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="dbscan%E6%99%9A%E4%BC%9A%E4%B8%8A%E7%9A%84%E7%A4%BE%E4%BA%A4%E5%9C%88%E5%AD%90">DBSCAN：晚会上的社交圈子</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>        ●●●●●                    ▲▲▲
      ●●     ●●●               ▲▲   ▲▲
     ●   A区    ●●           ▲   B区   ▲
     ●    (舞池)  ●          ▲   (吧台)  ▲
      ●●       ●●             ▲▲     ▲▲
        ●●●●                     ▲▲▲▲

           ●                        ◆
              ◆                        ◆
           ◆     ◆    ◆
        (稀疏区域 - 噪声点)
</code></pre>
<ul>
<li>A区（舞池）：人挤人，密度很高 → 簇</li>
<li>B区（吧台）：人也很多，密度高 → 簇</li>
<li>中间稀疏区域：人很少 → 簇间分隔</li>
<li>角落几个人：周围没人 → 噪声点</li>
</ul>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="dbscan%E6%A0%B8%E5%BF%83%E7%82%B9%E8%BE%B9%E7%95%8C%E7%82%B9%E5%99%AA%E5%A3%B0%E7%82%B9">DBSCAN：核心点、边界点、噪声点</h2>
<p>DBSCAN 将数据点分为三类：</p>
<table>
<thead>
<tr>
<th>点的类型</th>
<th>周围人多不多？</th>
<th>靠近核心点吗？</th>
<th>类比</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>核心点</strong></td>
<td>是（≥ MinPts）</td>
<td>是</td>
<td>人气王</td>
</tr>
<tr>
<td><strong>边界点</strong></td>
<td>否</td>
<td>是</td>
<td>边缘成员</td>
</tr>
<tr>
<td><strong>噪声点</strong></td>
<td>否</td>
<td>否</td>
<td>孤家寡人</td>
</tr>
</tbody>
</table>
<p><strong>两个关键参数</strong>：</p>
<ul>
<li><strong>ε（eps）</strong>：邻域半径 → &quot;你的朋友圈有多大&quot;</li>
<li><strong>MinPts</strong>：最小点数 → &quot;朋友圈里至少要有多少人&quot;</li>
</ul>
</section>

<header>聚类分析（Cluster Analysis）</header>
<h2 id="dbscan-%E7%AE%97%E6%B3%95%E6%AD%A5%E9%AA%A4%E6%8E%A2%E7%B4%A2%E6%B8%B8%E6%88%8F">DBSCAN 算法步骤：探索游戏</h2>
<p>想象你在一个黑暗的大房间里探索，寻找&quot;人群聚集区&quot;：</p>
<ol>
<li>
<p><strong>随机选一个起点</strong>：看看周围有多少人？</p>
<ul>
<li>人够多（≥ MinPts）→ 发现新簇！</li>
<li>人太少 → 暂时标记为&quot;可能是噪声&quot;</li>
</ul>
</li>
<li>
<p><strong>顺藤摸瓜</strong>：查看核心点的&quot;朋友圈&quot;</p>
<ul>
<li>周围人也很多 → 加入簇，继续扩展</li>
<li>周围人不多 → 标记为边界点</li>
</ul>
</li>
<li>
<p><strong>重复探索</strong>：直到所有人都被访问过</p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-class="lead" data-paginate="true" data-header="聚类分析（Cluster Analysis）" data-style="section {

<header>聚类分析（Cluster Analysis）</header>
<h2 id="dbscan-%E4%BC%98%E7%BC%BA%E7%82%B9">DBSCAN 优缺点</h2>
<p><strong>优点</strong>：</p>
<ul>
<li>不需要预先指定簇数</li>
<li>可以发现任意形状的簇</li>
<li>能够识别噪声点和异常值</li>
<li>对数据中的输入顺序不敏感</li>
</ul>
<p><strong>缺点</strong>：</p>
<ul>
<li>对参数 ε 和 MinPts 敏感</li>
<li>不适合密度差异很大的数据集</li>
<li>高维数据中距离计算困难</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-class="lead" data-paginate="true" data-header="聚类分析（Cluster Analysis）" data-style="section {

<header>聚类分析（Cluster Analysis）</header>
<h2 id="%E5%A6%82%E4%BD%95%E9%80%89%E6%8B%A9%E7%AE%97%E6%B3%95">如何选择算法？</h2>
<p><strong>选择 K-Means 的情况</strong>：</p>
<ul>
<li>数据量大</li>
<li>簇大致呈球状</li>
<li>需要快速计算</li>
<li>对簇数有先验知识</li>
</ul>
<p><strong>选择层次聚类的情况</strong>：</p>
<ul>
<li>数据量小</li>
<li>需要了解层次结构</li>
<li>需要可视化和解释性</li>
</ul>
<p><strong>选择 DBSCAN 的情况</strong>：</p>
<ul>
<li>簇的形状可能不规则</li>
<li>数据中含有噪声/异常值</li>
<li>不知道簇数目</li>
</ul>
</section>
