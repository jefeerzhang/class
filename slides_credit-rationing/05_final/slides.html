<header>信贷配给理论</header>
<h1 id="%E4%BF%A1%E8%B4%B7%E9%85%8D%E7%BB%99%E7%9A%84%E5%AE%9A%E4%B9%89">信贷配给的定义</h1>
<p><strong>信贷配给</strong>：借款人愿付更高利率，贷款人仍拒绝放贷</p>
<p>关键区别：</p>
<ul>
<li>贷款不足：利率偏低，提高利率可解决</li>
<li><strong>信贷配给</strong>：利率本身无法出清市场</li>
</ul>
<blockquote>
<p>提高利率 → 吸引高风险借款人（逆向选择）→ 鼓励高风险项目（道德风险）→ 银行期望收益反而下降</p>
</blockquote>
<footer>信息不对称与金融摩擦</footer>

<header>信贷配给理论</header>
<h1 id="%E9%81%93%E5%BE%B7%E9%A3%8E%E9%99%A9">道德风险</h1>
<p><strong>事后信息不对称</strong> — 发生在签约之后</p>
<p>当行为不可观测且成本由对方承担时，行为方会更不审慎</p>
<ul>
<li>买了全额火险的人，可能更疏于防范火灾</li>
<li>买了高额车险的人，可能更疏忽驾驶</li>
<li>获得贷款的企业家，可能选择高风险项目</li>
</ul>
<blockquote>
<p>借款人的行为选择是私人信息，出借人无法观测</p>
</blockquote>
<footer>信息不对称与金融摩擦</footer>
</section>

<h1 id="%E9%80%86%E5%90%91%E9%80%89%E6%8B%A9">逆向选择</h1>
<p><strong>事前信息不对称</strong> — 存在于签约之前</p>
<p>有私人信息的一方选择性地进行有利交易，让另一方受损</p>
<ul>
<li>身体不好的人更有动力参加医疗保险</li>
<li>二手车市场中，好车退出导致平均质量下降（Akerlof, 1970）</li>
</ul>
<blockquote>
<p>提高利率会赶走安全借款人，留下高风险者</p>
</blockquote>

<h1 id="%E5%A7%94%E6%89%98%E4%BB%A3%E7%90%86%E6%A8%A1%E5%9E%8B">委托代理模型</h1>
<p><strong>委托代理模型</strong>是分析信息不对称的核心工具</p>
