<h1 id="%E5%89%8D%E6%99%AF%E7%90%86%E8%AE%BA-prospect-theory">前景理论 (Prospect Theory)</h1>
<h2 id="%E7%90%86%E8%AE%BA%E8%B5%B7%E6%BA%90%E4%B8%8E%E8%83%8C%E6%99%AF">理论起源与背景</h2>
<ul>
<li><strong>1979年</strong>由丹尼尔·卡尼曼（Daniel Kahneman）和阿莫斯·特沃斯基（Amos Tversky）提出</li>
<li>挑战传统**期望效用理论（EUT）**的理性人假设</li>
<li>卡尼曼荣获 <strong>2002年诺贝尔经济学奖</strong></li>
<li>行为经济学和行为金融学最核心的基石</li>
</ul>
