<header>实证公司金融中的内生性</header>
<h2 id="%E5%85%AC%E5%8F%B8%E9%87%91%E8%9E%8D%E7%9A%84%E5%86%85%E7%94%9F%E6%80%A7%E4%B8%BA%E4%BD%95%E6%A0%BC%E5%A4%96%E6%A3%98%E6%89%8B">公司金融的内生性为何格外棘手</h2>
<p>这个领域几乎每一个变量都是管理层优化决策的结果，而优化过程依赖大量私有信息——这些信息进了误差项，天然就和解释变量相关。</p>
<p>再加上变量之间反馈环路很多：杠杆影响投资，投资又反过来影响融资决策。更麻烦的是，理论里常说的&quot;投资机会&quot;、&quot;代理成本&quot;、&quot;治理质量&quot;这类概念，根本找不到完美的代理变量。</p>
<p>后果可能是灾难性的：系数符号被颠倒、政策建议被误导，甚至把资本错误配置到不该去的地方。</p>
</section>

ole="img" focusable="false" viewBox="0 -442 572 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D465" d="M52 289Q59 331 106 386T222 442Q257 442 286 424T329 379Q371 442 430 442Q467 442 494 420T522 361Q522 332 508 314T481 292T458 288Q439 288 427 299T415 328Q415 374 465 391Q454 404 425 404Q412 404 406 402Q368 386 350 336Q290 115 290 78Q290 50 306 38T341 26Q378 26 414 59T463 140Q466 150 469 151T485 153H489Q504 153 504 145Q504 144 502 134Q486 77 440 33T333 -11Q263 -11 227 52Q186 -10 133 -10H127Q78 -10 57 16T35 71Q35 103 54 123T99 143Q142 143 142 101Q142 81 130 66T107 46T94 41L91 40Q91 39 97 36T113 29T132 26Q168 26 194 71Q203 87 217 139T245 247T261 313Q266 340 266 352Q266 380 251 392T217 404Q177 404 142 372T93 290Q91 281 88 280T72 278H58Q52 284 52 289Z"></path></g></g></g></svg></mjx-container> 相关，复合误差项 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.489ex;" xmlns="http://www.w3.org/2000/svg" width="11.023ex" height="1.808ex" role="img" focusable="false" viewBox="0 -583 4872 799"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D463" d="M173 380Q173 405 154 405Q130 405 104 376T61 287Q60 286 59 284T58 281T56 279T53 278T49 278T41 278H27Q21 284 21 287Q21 294 29 316T53 368T97 419T160 441Q202 441 225 417T249 361Q249 344 246 335Q246 329 231 291T200 202T182 113Q182 86 187 69Q200 26 250 26Q287 26 319 60T369 139T398 222T409 277Q409 300 401 317T383 343T365 361T357 383Q357 405 376 424T417 443Q436 443 451 425T467 367Q467 340 455 284T418 159T347 40T241 -11Q177 -11 139 22Q102 54 102 117Q102 148 110 181T151 298Q173 362 173 380Z"></path></g><g data-mml-node="mo" transform="translate(762.8,0)"><path data-c="3D" d="M56 347Q56 360 70 367H707Q722 359 722 347Q722 336 708 328L390 327H72Q56 332 56 347ZM56 153Q56 168 72 173H708Q722 163 722 153Q722 140 707 133H70Q56 140 56 153Z"></path></g><g data-mml-node="mi" transform="translate(1818.6,0)"><path data-c="1D6FE" d="M31 249Q11 249 11 258Q11 275 26 304T66 365T129 418T206 441Q233 441 239 440Q287 429 318 386T371 255Q385 195 385 170Q385 166 386 166L398 193Q418 244 443 300T486 391T508 430Q510 431 524 431H537Q543 425 543 422Q543 418 522 378T463 251T391 71Q385 55 378 6T357 -100Q341 -165 330 -190T303 -216Q286 -216 286 -188Q286 -138 340 32L346 51L347 69Q348 79 348 100Q348 257 291 317Q251 355 196 355Q148 355 108 329T51 260Q49 251 47 251Q45 249 31 249Z"></path></g><g data-mml-node="mi" transform="translate(2361.6,0)"><path data-c="1D464" d="M580 385Q580 406 599 424T641 443Q659 443 674 425T690 368Q690 339 671 253Q656 197 644 161T609 80T554 12T482 -11Q438 -11 404 5T355 48Q354 47 352 44Q311 -11 252 -11Q226 -11 202 -5T155 14T118 53T104 116Q104 170 138 262T173 379Q173 380 173 381Q173 390 173 393T169 400T158 404H154Q131 404 112 385T82 344T65 302T57 280Q55 278 41 278H27Q21 284 21 287Q21 293 29 315T52 366T96 418T161 441Q204 441 227 416T250 358Q250 340 217 250T184 111Q184 65 205 46T258 26Q301 26 334 87L339 96V119Q339 122 339 128T340 136T341 143T342 152T345 165T348 182T354 206T362 238T373 281Q402 395 406 404Q419 431 449 431Q468 431 475 421T483 402Q483 389 454 274T422 142Q420 131 420 107V100Q420 85 423 71T442 42T487 26Q558 26 600 148Q609 171 620 213T632 273Q632 306 619 325T593 357T580 385Z"></path></g><g data-mml-node="mo" transform="translate(3299.8,0)"><path data-c="2B" d="M56 237T56 250T70 270H369V420L370 570Q380 583 389 583Q402 583 409 568V270H707Q722 262 722 250T707 230H409V-68Q401 -82 391 -82H389H387Q375 -82 369 -68V230H70Q56 237 56 250Z"></path></g><g data-mml-node="mi" transform="translate(4300,0)"><path data-c="1D462" d="M21 287Q21 295 30 318T55 370T99 420T158 442Q204 442 227 417T250 358Q250 340 216 246T182 105Q182 62 196 45T238 27T291 44T328 78L339 95Q341 99 377 247Q407 367 413 387T427 416Q444 431 463 431Q480 431 488 421T496 402L420 84Q419 79 419 68Q419 43 426 35T447 26Q469 29 482 57T512 145Q514 153 532 153Q551 153 551 144Q550 139 549 130T540 98T523 55T498 17T462 -8Q454 -10 438 -10Q372 -10 347 46Q345 45 336 36T318 21T296 6T267 -6T233 -11Q189 -11 155 7Q103 38 103 113Q103 170 138 262T173 379Q173 380 173 381Q173 390 173 393T169 400T158 404H154Q131 404 112 385T82 344T65 302T57 280Q55 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container> 就不再和 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.294ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 572 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D465" d="M52 289Q59 331 106 386T222 442Q257 442 286 424T329 379Q371 442 430 442Q467 442 494 420T522 361Q522 332 508 314T481 292T458 288Q439 288 427 299T415 328Q415 374 465 391Q454 404 425 404Q412 404 406 402Q368 386 350 336Q290 115 290 78Q290 50 306 38T341 26Q378 26 414 59T463 140Q466 150 469 151T485 153H489Q504 153 504 145Q504 144 502 134Q486 77 440 33T333 -11Q263 -11 227 52Q186 -10 133 -10H127Q78 -10 57 16T35 71Q35 103 54 123T99 143Q142 143 142 101Q142 81 130 66T107 46T94 41L91 40Q91 39 97 36T113 29T132 26Q168 26 194 71Q203 87 217 139T245 247T261 313Q266 340 266 352Q266 380 251 392T217 404Q177 404 142 372T93 290Q91 281 88 280T72 278H58Q52 284 52 289Z"></path></g></g></g></svg></mjx-container> 独立，OLS 估计当然是有偏的。</p>
<p>举两个公司金融里经典的例子：</p>
<ul>
<li>现金流和投资的关系。Fazzari 等人的著名研究发现投资对现金流敏感，但现金流不只是融资约束的反映，它也代理了未来的投资机会。如果投资机会没控制好，现金流的系数就会被高估。</li>
<li>盈利能力与杠杆率。Rajan &amp; Zingales 发现盈利高的企业杠杆低，但这可能只是因为经营风险同时影响了盈利和杠杆选择，而不是优序融资理论的直接证据。</li>
</ul>

<header>实证公司金融中的内生性</header>
<h2 id="%E8%81%94%E7%AB%8B%E6%80%A7%E5%81%8F%E5%B7%AE">联立性偏差</h2>
<p>当 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.464ex;" xmlns="http://www.w3.org/2000/svg" width="1.109ex" height="1.464ex" role="img" focusable="false" viewBox="0 -442 490 647"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D466" d="M21 287Q21 301 36 335T84 406T158 442Q199 442 224 419T250 355Q248 336 247 334Q247 331 231 288T198 191T182 105Q182 62 196 45T238 27Q261 27 281 38T312 61T339 94Q339 95 344 114T358 173T377 247Q415 397 419 404Q432 431 462 431Q475 431 483 424T494 412T496 403Q496 390 447 193T391 -23Q363 -106 294 -155T156 -205Q111 -205 77 -183T43 -117Q43 -95 50 -80T69 -58T89 -48T106 -45Q150 -45 150 -87Q150 -107 138 -122T115 -142T102 -147L99 -148Q101 -153 118 -160T152 -167H160Q177 -167 186 -165Q219 -156 247 -127T290 -65T313 -9T321 21L315 17Q309 13 296 6T270 -6Q250 -11 231 -11Q185 -11 150 11T104 82Q103 89 103 113Q103 170 138 262T173 379Q173 380 173 381Q173 390 173 393T169 400T158 404H154Q131 404 112 385T82 344T65 302T57 280Q55 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container> 和 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.294ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 572 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D465" d="M52 289Q59 331 106 386T222 442Q257 442 286 424T329 379Q371 442 430 442Q467 442 494 420T522 361Q522 332 508 314T481 292T458 288Q439 288 427 299T415 328Q415 374 465 391Q454 404 425 404Q412 404 406 402Q368 386 350 336Q290 115 290 78Q290 50 306 38T341 26Q378 26 414 59T463 140Q466 150 469 151T485 153H489Q504 153 504 145Q504 144 502 134Q486 77 440 33T333 -11Q263 -11 227 52Q186 -10 133 -10H127Q78 -10 57 16T35 71Q35 103 54 123T99 143Q142 143 142 101Q142 81 130 66T107 46T94 41L91 40Q91 39 97 36T113 29T132 26Q168 26 194 71Q203 87 217 139T245 247T261 313Q266 340 266 352Q266 380 251 392T217 404Q177 404 142 372T93 290Q91 281 88 280T72 278H58Q52 284 52 289Z"></path></g></g></g></svg></mjx-container> 由市场均衡共同决定时，单向因果的假定就失效了。</p>
<ul>
<li>反收购条款与公司价值。到底是反收购条款毁掉了公司价值，还是本来价值就低的公司更愿意采纳反收购条款来保护管理层？</li>
<li>股利政策。高股利企业通常估值不错，但这很可能只是因为成熟、低成长的自然结果，而不是股利本身创造了价值。</li>
<li>多元化折价。Villalonga 指出，多元化企业市值更低，但真相也许是主营业务陷入困境的企业才被迫多元化。</li>
</ul>
<blockquote>
<p>联立性偏误的符号往往很难事先判断，因为它取决于多重弹性与冲击方差的相对大小。</p>
</blockquote>
</section>

<h2 id="%E6%B5%8B%E9%87%8F%E8%AF%AF%E5%B7%AE">测量误差</h2>
<p>如果因变量的测量误差和解释变量不相关，OLS 仍是一致的，只是标准误会变大；但如果相关，偏误就来了。</p>

<header>实证公司金融中的内生性</header>
<h2 id="%E6%A0%B7%E6%9C%AC%E9%80%89%E6%8B%A9%E5%81%8F%E8%AF%AF">样本选择偏误</h2>
<p>研究者拿到的样本往往不是总体的随机子集。如果进入样本的概率和某些不可观测因素有关，那基于这个样本的推断就很难推广。</p>
<p>公司金融里到处都是这种陷阱：</p>
<ul>
<li>Compustat 里的上市公司本身就不是随机企业</li>
<li>银行数据库里只有获批贷款的借款人，被拒贷的企业你看不到</li>
<li>分析师覆盖的样本偏向大市值、高流动性公司</li>
<li>并购研究里只保留了最终完成的交易，失败案例被系统性排除</li>
</ul>
</section>

<h2 id="heckman-%E4%B8%A4%E9%98%B6%E6%AE%B5%E6%A8%A1%E5%9E%8B">Heckman 两阶段模型</h2>
<p>Heckman (1979) 的处理思路是这样的：</p>
<p>先跑一个 Probit 或 Logit，估计个体进入样本的概率，算出逆米尔斯比率 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.027ex;" xmlns="http://www.w3.org/2000/svg" width="1.319ex" height="1.597ex" role="img" focusable="false" viewBox="0 -694 583 706"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D706" d="M166 673Q166 685 183 694H202Q292 691 316 644Q322 629 373 486T474 207T524 67Q531 47 537 34T546 15T551 6T555 2T556 -2T550 -11H482Q457 3 450 18T399 152L354 277L340 262Q327 246 293 207T236 141Q211 112 174 69Q123 9 111 -1T83 -12Q47 -12 47 20Q47 37 61 52T199 187Q229 216 266 252T321 306L338 322Q338 323 288 462T234 612Q214 657 183 657Q166 657 166 673Z"></path></g></g></g></svg></mjx-container>；再把 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.027ex;" xmlns="http://www.w3.org/2000/svg" width="1.319ex" height="1.597ex" role="img" focusable="false" viewBox="0 -694 583 706"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D706" d="M166 673Q166 685 183 694H202Q292 691 316 644Q322 629 373 486T474 207T524 67Q531 47 537 34T546 15T551 6T555 2T556 -2T550 -11H482Q457 3 450 18T399 152L354 277L340 262Q327 246 293 207T236 141Q211 112 174 69Q123 9 111 -1T83 -12Q47 -12 47 20Q47 37 61 52T199 187Q229 216 266 252T321 306L338 322Q338 323 288 462T234 612Q214 657 183 657Q166 657 166 673Z"></path></g></g></g></svg></mjx-container> 放到第二阶段的结果方程里。如果 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.027ex;" xmlns="http://www.w3.org/2000/svg" width="1.319ex" height="1.597ex" role="img" focusable="false" viewBox="0 -694 583 706"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D706" d="M166 673Q166 685 183 694H202Q292 691 316 644Q322 629 373 486T474 207T524 67Q531 47 537 34T546 15T551 6T555 2T556 -2T550 -11H482Q457 3 450 18T399 152L354 277L340 262Q327 246 293 207T236 141Q211 112 174 69Q123 9 111 -1T83 -12Q47 -12 47 20Q47 37 61 52T199 187Q229 216 266 252T321 306L338 322Q338 323 288 462T234 612Q214 657 183 657Q166 657 166 673Z"></path></g></g></g></svg></mjx-container> 显著，就说明样本选择偏误确实存在。</p>
<p>最困难的地方在于找<strong>排他性变量</strong>——它得影响是否进入样本，但又不能直接影响结果。在公司金融里，这通常要依赖对制度背景的深入理解，比如某家银行内部的信贷政策偏好，或者某次外部信贷紧缩冲击。</p>
</section>

<li><strong>排他性约束</strong>：<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.052ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 465 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D467" d="M347 338Q337 338 294 349T231 360Q211 360 197 356T174 346T162 335T155 324L153 320Q150 317 138 317Q117 317 117 325Q117 330 120 339Q133 378 163 406T229 440Q241 442 246 442Q271 442 291 425T329 392T367 375Q389 375 411 408T434 441Q435 442 449 442H462Q468 436 468 434Q468 430 463 420T449 399T432 377T418 358L411 349Q368 298 275 214T160 106L148 94L163 93Q185 93 227 82T290 71Q328 71 360 90T402 140Q406 149 409 151T424 153Q443 153 443 143Q443 138 442 134Q425 72 376 31T278 -11Q252 -11 232 6T193 40T155 57Q111 57 76 -3Q70 -11 59 -11H54H41Q35 -5 35 -2Q35 13 93 84Q132 129 225 214T340 322Q352 338 347 338Z"></path></g></g></g></svg></mjx-container> 只能通过 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.294ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 572 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D465" d="M52 289Q59 331 106 386T222 442Q257 442 286 424T329 379Q371 442 430 442Q467 442 494 420T522 361Q522 332 508 314T481 292T458 288Q439 288 427 299T415 328Q415 374 465 391Q454 404 425 404Q412 404 406 402Q368 386 350 336Q290 115 290 78Q290 50 306 38T341 26Q378 26 414 59T463 140Q466 150 469 151T485 153H489Q504 153 504 145Q504 144 502 134Q486 77 440 33T333 -11Q263 -11 227 52Q186 -10 133 -10H127Q78 -10 57 16T35 71Q35 103 54 123T99 143Q142 143 142 101Q142 81 130 66T107 46T94 41L91 40Q91 39 97 36T113 29T132 26Q168 26 194 71Q203 87 217 139T245 247T261 313Q266 340 266 352Q266 380 251 392T217 404Q177 404 142 372T93 290Q91 281 88 280T72 278H58Q52 284 52 289Z"></path></g></g></g></svg></mjx-container> 影响 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.464ex;" xmlns="http://www.w3.org/2000/svg" width="1.109ex" height="1.464ex" role="img" focusable="false" viewBox="0 -442 490 647"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D466" d="M21 287Q21 301 36 335T84 406T158 442Q199 442 224 419T250 355Q248 336 247 334Q247 331 231 288T198 191T182 105Q182 62 196 45T238 27Q261 27 281 38T312 61T339 94Q339 95 344 114T358 173T377 247Q415 397 419 404Q432 431 462 431Q475 431 483 424T494 412T496 403Q496 390 447 193T391 -23Q363 -106 294 -155T156 -205Q111 -205 77 -183T43 -117Q43 -95 50 -80T69 -58T89 -48T106 -45Q150 -45 150 -87Q150 -107 138 -122T115 -142T102 -147L99 -148Q101 -153 118 -160T152 -167H160Q177 -167 186 -165Q219 -156 247 -127T290 -65T313 -9T321 21L315 17Q309 13 296 6T270 -6Q250 -11 231 -11Q185 -11 150 11T104 82Q103 89 103 113Q103 170 138 262T173 379Q173 380 173 381Q173 390 173 393T169 400T158 404H154Q131 404 112 385T82 344T65 302T57 280Q55 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container>，不能走别的路。这个<strong>没法直接检验</strong>，只能靠经济学故事和制度细节来说服人。</li>
</ul>
<p>2SLS 的直觉很简单：把 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.294ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 572 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D465" d="M52 289Q59 331 106 386T222 442Q257 442 286 424T329 379Q371 442 430 442Q467 442 494 420T522 361Q522 332 508 314T481 292T458 288Q439 288 427 299T415 328Q415 374 465 391Q454 404 425 404Q412 404 406 402Q368 386 350 336Q290 115 290 78Q290 50 306 38T341 26Q378 26 414 59T463 140Q466 150 469 151T485 153H489Q504 153 504 145Q504 144 502 134Q486 77 440 33T333 -11Q263 -11 227 52Q186 -10 133 -10H127Q78 -10 57 16T35 71Q35 103 54 123T99 143Q142 143 142 101Q142 81 130 66T107 46T94 41L91 40Q91 39 97 36T113 29T132 26Q168 26 194 71Q203 87 217 139T245 247T261 313Q266 340 266 352Q266 380 251 392T217 404Q177 404 142 372T93 290Q91 281 88 280T72 278H58Q52 284 52 289Z"></path></g></g></g></svg></mjx-container> 的波动分成&quot;干净的&quot;和&quot;脏的&quot;两部分，只用干净的那部分来识别参数。</p>
</section>

<header>实证公司金融中的内生性</header>
<h2 id="iv-%E7%9A%84%E6%A3%80%E9%AA%8C%E5%B1%80%E9%99%90%E4%B8%8E%E5%B8%B8%E8%A7%81%E8%AF%AF%E5%8C%BA">IV 的检验、局限与常见误区</h2>
<p><strong>过度识别检验</strong>（Sargan / Hansen J）有个隐含前提：至少得有一个工具变量是真正外生的。它从来不能替代对排他性的经济学论证。</p>
<p><strong>弱工具变量</strong>是另一个大坑。Stock-Yogo 的经验法则告诉我们，3 个 IV 时第一阶段 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.695ex" height="1.538ex" role="img" focusable="false" viewBox="0 -680 749 680"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D439" d="M48 1Q31 1 31 11Q31 13 34 25Q38 41 42 43T65 46Q92 46 125 49Q139 52 144 61Q146 66 215 342T285 622Q285 629 281 629Q273 632 228 634H197Q191 640 191 642T193 659Q197 676 203 680H742Q749 676 749 669Q749 664 736 557T722 447Q720 440 702 440H690Q683 445 683 453Q683 454 686 477T689 530Q689 560 682 579T663 610T626 626T575 633T503 634H480Q398 633 393 631Q388 629 386 623Q385 622 352 492L320 363H375Q378 363 398 363T426 364T448 367T472 374T489 386Q502 398 511 419T524 457T529 475Q532 480 548 480H560Q567 475 567 470Q567 467 536 339T502 207Q500 200 482 200H470Q463 206 463 212Q463 215 468 234T473 274Q473 303 453 310T364 317H309L277 190Q245 66 245 60Q245 46 334 46H359Q365 40 365 39T363 19Q359 6 353 0H336Q295 2 185 2Q120 2 86 2T48 1Z"></path></g></g></g></svg></mjx-container> 统计量最好大于 9.08，否则 2SLS 在小样本里可能比 OLS 还糟。</p>
<p>还有一个常见误区是拿<strong>滞后变量当 IV</strong>。公司金融数据持续性很强，如果当期 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.294ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 572 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D465" d="M52 289Q59 331 106 386T222 442Q257 442 286 424T329 379Q371 442 430 442Q467 442 494 420T522 361Q522 332 508 314T481 292T458 288Q439 288 427 299T415 328Q415 374 465 391Q454 404 425 404Q412 404 406 402Q368 386 350 336Q290 115 290 78Q290 50 306 38T341 26Q378 26 414 59T463 140Q466 150 469 151T485 153H489Q504 153 504 145Q504 144 502 134Q486 77 440 33T333 -11Q263 -11 227 52Q186 -10 133 -10H127Q78 -10 57 16T35 71Q35 103 54 123T99 143Q142 143 142 101Q142 81 130 66T107 46T94 41L91 40Q91 39 97 36T113 29T132 26Q168 26 194 71Q203 87 217 139T245 247T261 313Q266 340 266 352Q266 380 251 392T217 404Q177 404 142 372T93 290Q91 281 88 280T72 278H58Q52 284 52 289Z"></path></g></g></g></svg></mjx-container> 和误差项相关，滞后项往往也相关。没有明确的经济学论证，不建议这么干。唯一被严格认可的场景是基于理性预期的欧拉方程估计。</p>
</section>

<header>实证公司金融中的内生性</header>
<h2 id="iv-%E8%BF%98%E8%83%BD%E5%91%8A%E8%AF%89%E6%88%91%E4%BB%AC%E4%BB%80%E4%B9%88%E4%B8%8D%E8%83%BD%E5%91%8A%E8%AF%89%E6%88%91%E4%BB%AC%E4%BB%80%E4%B9%88">IV 还能告诉我们什么、不能告诉我们什么</h2>
<p>IV 估计出来的是 <strong>LATE</strong>（局部平均处理效应），也就是那些因为工具变量才从&quot;不接受处理&quot;变成&quot;接受处理&quot;的群体（compliers）的平均效应。它不一定能推广到整个人群。</p>
<p>另外，如果你的模型里同时有好几个内生变量，但只给其中一部分找到了 IV，那其余系数的估计仍然不能保证一致。</p>
<p>最后，即使工具变量本身是随机的，如果处理效应在人群中异质，而且个体会根据预期收益自我选择，IV 也可能出问题。</p>
</section>

<p>横截面差分去掉组间固定差异，时间差分去掉共同趋势，剩下的就是处理效应。</p>
</section>

<header>实证公司金融中的内生性</header>
<h2 id="%E5%B9%B3%E8%A1%8C%E8%B6%8B%E5%8A%BF%E5%81%87%E8%AE%BE%E4%B8%8E%E6%80%8E%E4%B9%88%E9%AA%8C%E8%AF%81%E5%AE%83">平行趋势假设与怎么验证它</h2>
<p>DD 最核心的假设是：<strong>如果没有政策冲击，处理组和控制组的趋势本来应该是一样的</strong>。这个假设在数学上没法直接检验，但你可以做几件事来增强可信度：</p>
<ul>
<li>画事件前趋势图，看两组在政策前是否平行</li>
<li>做安慰剂检验，把处理时间人为提前一年或两年，看看&quot;虚假&quot;的处理效应是否显著</li>
<li>找几个理论上不应该受政策影响的变量做替换检验</li>
<li>如果有多个处理组或控制组，可以进一步做三重差分（DDD）</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-class="lead" data-paginate="true" data-header="实证公司金融中的内生性" data-background-color="#fff" data-background-image="url('https://marp.app/assets/hero-background.jpg')" data-theme="gaia" data-style="section {

<h2 id="%E6%96%AD%E7%82%B9%E5%9B%9E%E5%BD%92%E8%AE%BE%E8%AE%A1">断点回归设计</h2>
<p>RDD 的想法很直接：既然处理分配完全取决于某个临界点，那就在临界值附近找因果效应。临界点两边的企业，只要差一点没跨过去，本质上应该非常相似。</p>
<p><strong>Sharp RDD</strong>：一过临界点就一定被处理。比如 Chava &amp; Roberts (2008) 研究的银行贷款契约财务比率阈值。</p>
<p><strong>Fuzzy RDD</strong>：临界点只是提高了被处理的概率。比如 Keys et al. (2010) 发现的 FICO 评分在 620 附近贷款证券化概率的跳跃。</p>
<blockquote>
<p>这里的关键假设是局部连续性：潜在结果在临界点处是光滑的，没有跳跃。</p>
</blockquote>
</section>

<h2 id="rdd-%E6%80%8E%E4%B9%88%E5%81%9A%E6%80%8E%E4%B9%88%E6%89%8D%E7%AE%97%E9%9D%A0%E8%B0%B1">RDD 怎么做、怎么才算靠谱</h2>
<p><strong>估计上</strong>，你有两种选择：</p>
<ul>
<li>参数化：在临界点两侧分别拟合多项式</li>
<li>非参数化：只用临界点附近一个带宽 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.303ex" height="1.595ex" role="img" focusable="false" viewBox="0 -694 576 705"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="210E" d="M137 683Q138 683 209 688T282 694Q294 694 294 685Q294 674 258 534Q220 386 220 383Q220 381 227 388Q288 442 357 442Q411 442 444 415T478 336Q478 285 440 178T402 50Q403 36 407 31T422 26Q450 26 474 56T513 138Q516 149 519 151T535 153Q555 153 555 145Q555 144 551 130Q535 71 500 33Q466 -10 419 -10H414Q367 -10 346 17T325 74Q325 90 361 192T398 345Q398 404 354 404H349Q266 404 205 306L198 293L164 158Q132 28 127 16Q114 -11 83 -11Q69 -11 59 -2T48 16Q48 30 121 320L195 616Q195 629 188 632T149 637H128Q122 643 122 645T124 664Q129 683 137 683Z"></path></g></g></g></svg></mjx-container> 内的样本做局部线性回归</li>
</ul>
<p><strong>稳健性检验</strong>包括：</p>
<ul>
<li>McCrary 密度检验：看企业会不会人为操纵分配变量来刚好跨过门槛</li>
<li>协变量平衡检验：用不受处理影响的变量做 RDD，看临界点处有没有不该有的跳跃</li>
<li>安慰剂检验：在假的临界点处跑一遍，看看是不是只有真临界点显著</li>
</ul>
</section>

<h2 id="%E5%8C%B9%E9%85%8D%E6%96%B9%E6%B3%95">匹配方法</h2>
<p>匹配的基本想法是：给每个处理组个体找一个在可观测特征上&quot;最像&quot;的控制组个体，从而构造出反事实结果。</p>
<p>但这个方法高度依赖两个假设：</p>
<ul>
<li><strong>无混淆性</strong>：控制了可观测变量 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.928ex" height="1.545ex" role="img" focusable="false" viewBox="0 -683 852 683"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D44B" d="M42 0H40Q26 0 26 11Q26 15 29 27Q33 41 36 43T55 46Q141 49 190 98Q200 108 306 224T411 342Q302 620 297 625Q288 636 234 637H206Q200 643 200 645T202 664Q206 677 212 683H226Q260 681 347 681Q380 681 408 681T453 682T473 682Q490 682 490 671Q490 670 488 658Q484 643 481 640T465 637Q434 634 411 620L488 426L541 485Q646 598 646 610Q646 628 622 635Q617 635 609 637Q594 637 594 648Q594 650 596 664Q600 677 606 683H618Q619 683 643 683T697 681T738 680Q828 680 837 683H845Q852 676 852 672Q850 647 840 637H824Q790 636 763 628T722 611T698 593L687 584Q687 585 592 480L505 384Q505 383 536 304T601 142T638 56Q648 47 699 46Q734 46 734 37Q734 35 732 23Q728 7 725 4T711 1Q708 1 678 1T589 2Q528 2 496 2T461 1Q444 1 444 10Q444 11 446 25Q448 35 450 39T455 44T464 46T480 47T506 54Q523 62 523 64Q522 64 476 181L429 299Q241 95 236 84Q232 76 232 72Q232 53 261 47Q262 47 267 47T273 46Q276 46 277 46T280 45T283 42T284 35Q284 26 282 19Q279 6 276 4T261 1Q258 1 243 1T201 2T142 2Q64 2 42 0Z"></path></g></g></g></svg></mjx-container> 之后，潜在结果和处理分配独立。这个假设非常强，而且没法检验。</li>
<li><strong>共同支撑</strong>：对于每一个 <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.928ex" height="1.545ex" role="img" focusable="false" viewBox="0 -683 852 683"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D44B" d="M42 0H40Q26 0 26 11Q26 15 29 27Q33 41 36 43T55 46Q141 49 190 98Q200 108 306 224T411 342Q302 620 297 625Q288 636 234 637H206Q200 643 200 645T202 664Q206 677 212 683H226Q260 681 347 681Q380 681 408 681T453 682T473 682Q490 682 490 671Q490 670 488 658Q484 643 481 640T465 637Q434 634 411 620L488 426L541 485Q646 598 646 610Q646 628 622 635Q617 635 609 637Q594 637 594 648Q594 650 596 664Q600 677 606 683H618Q619 683 643 683T697 681T738 680Q828 680 837 683H845Q852 676 852 672Q850 647 840 637H824Q790 636 763 628T722 611T698 593L687 584Q687 585 592 480L505 384Q505 383 536 304T601 142T638 56Q648 47 699 46Q734 46 734 37Q734 35 732 23Q728 7 725 4T711 1Q708 1 678 1T589 2Q528 2 496 2T461 1Q444 1 444 10Q444 11 446 25Q448 35 450 39T455 44T464 46T480 47T506 54Q523 62 523 64Q522 64 476 181L429 299Q241 95 236 84Q232 76 232 72Q232 53 261 47Q262 47 267 47T273 46Q276 46 277 46T280 45T283 42T284 35Q284 26 282 19Q279 6 276 4T261 1Q258 1 243 1T201 2T142 2Q64 2 42 0Z"></path></g></g></g></svg></mjx-container> 的取值，处理组和控制组都得有人。否则你根本找不到可比的匹配对象。</li>
</ul>
<p>因为无混淆性假设太强，匹配在公司金融里很少能独立解决根本的内生性问题，更适合作为<strong>稳健性检验</strong>，或者和 DD 结合起来用。</p>
</section>

<p>另一个实用的诊断工具是<strong>反向回归边界</strong>。直接回归会低估真实系数，反向回归会高估，真实系数一定落在这两者之间。如果区间不包含零，至少可以确认 OLS 估计的符号是可信的。</p>

<header>实证公司金融中的内生性</header>
<h2 id="%E7%94%A8%E4%BB%A3%E7%90%86%E5%8F%98%E9%87%8F%E6%97%B6%E7%9A%84%E4%B8%80%E7%82%B9%E5%BB%BA%E8%AE%AE">用代理变量时的一点建议</h2>
<p>第一，如果修正方法背后的假设本身就不太可信，不要为了用技术而用技术。</p>
<p>第二，在研究设计阶段，尽量选那些让拒绝原假设变得更难的代理变量。宁可犯第二类错误，也不要犯第一类错误。</p>
<p>第三，很多时候用代理变量做个粗分比较——比如只看分布最高和最低的两组——反而比精细的回归估计更稳健。</p>
</section>

<h2 id="%E5%A6%82%E6%9E%9C%E8%A6%81%E5%81%9A%E4%B8%80%E9%A1%B9%E7%A0%94%E7%A9%B6%E5%BB%BA%E8%AE%AE%E6%80%8E%E4%B9%88%E5%85%A5%E6%89%8B">如果要做一项研究，建议怎么入手</h2>
<p>首先，先想清楚识别问题：哪些变量可能是内生的？为什么？偏误的方向大概会怎样？</p>
<p>然后，再决定用哪类工具：是去外面找外生变异（IV、DD、RDD），还是依赖模型结构和数据特征（匹配、FE、测量误差修正）？</p>
<p>对于那些不可检验的假设——比如 IV 的排他性、DD 的平行趋势、匹配的无混淆性——要靠经济学逻辑和制度细节去论证，而不是靠某个检验的 p 值。</p>
<p>最后，尽可能多地报告不同规格、不同带宽、不同样本限制下的结果，让你的核心结论经得起敲打。</p>
