<header>回归分析及其应用：金融视角下的统计学习</header>
<h2 id="%E5%A4%9A%E5%85%83%E5%AE%9A%E6%80%A7%E5%93%8D%E5%BA%94%E5%8F%98%E9%87%8F%E5%9B%9E%E5%BD%92%E6%A6%82%E8%A7%88">多元定性响应变量回归概览</h2>
<p><strong>为什么需要定性响应变量回归？</strong></p>
<blockquote>
<p>问题：线性回归预测违约概率，可能得出120%或-30%的概率，不合理！</p>
</blockquote>
<p><strong>解决方案</strong>：需要特殊的&quot;变形器&quot;，把线性模型的输出变成合理的概率值</p>
<table>
<thead>
<tr>
<th>模型类型</th>
<th>响应变量</th>
<th>适用场景</th>
<th>代表模型</th>
<th>生活比喻</th>
</tr>
</thead>
<tbody>
<tr>
<td>二值响应</td>
<td>0/1（二分类）</td>
<td>违约预测、涨跌判断</td>
<td>Logistic、Probit</td>

<header>回归分析及其应用：金融视角下的统计学习</header>
<h2 id="%E5%A4%9A%E9%A1%B9logistic%E5%9B%9E%E5%BD%92%E4%B8%8E%E6%9C%89%E5%BA%8Flogistic%E5%9B%9E%E5%BD%92">多项Logistic回归与有序Logistic回归</h2>
<p><strong>多项Logistic回归</strong>（多类别无序）</p>
<ul>
<li><strong>适用场景</strong>：投资风格分类：保守型/平衡型/激进型</li>
<li><strong>生活比喻</strong>：选择早餐：煮鸡蛋、煎蛋、蒸蛋、炒蛋</li>
<li><strong>核心思想</strong>：以基准类别为参照，比较其他选择</li>
</ul>
<p><strong>有序Logistic回归</strong>（有序等级）</p>
<ul>
<li><strong>适用场景</strong>：信用评级：AAA &gt; AA &gt; A &gt; BBB</li>
<li><strong>生活比喻</strong>：电影评分：1星 &lt; 2星 &lt; 3星 &lt; 4星 &lt; 5星</li>
<li><strong>关键假设</strong>：每个因素对所有评级的影响是相同的</li>
</ul>
</section>

<header>回归分析及其应用：金融视角下的统计学习</header>
<h2 id="%E4%BC%A0%E7%BB%9F%E5%A4%9A%E5%85%83%E7%BA%BF%E6%80%A7%E5%9B%9E%E5%BD%9222">传统多元线性回归（2/2）</h2>
<p><strong>经典假设</strong>：</p>
<table>
<thead>
<tr>
<th>假设</th>
<th>生活比喻</th>
<th>检验方法</th>
<th>不满足会怎样</th>
</tr>
</thead>
<tbody>
<tr>
<td>线性性</td>
<td>房价和面积是直线关系</td>
<td>残差图、RESET检验</td>
<td>预测不准（应该用曲线）</td>
</tr>
<tr>
<td>误差正态性</td>
<td>预测误差是随机正态分布</td>
<td>Shapiro-Wilk、Q-Q图</td>
<td>统计推断可能不准</td>
</tr>
<tr>
<td>同方差性</td>
<td>小房子和大房子的预测误差波动一样大</td>
<td>Breusch-Pagan、White检验</td>
<td>权重不等，预测不准</td>
</tr>
<tr>
<td>无自相关</td>
<td>每个房子的预测误差相互独立</td>
<td>Durbin-Watson、Ljung-Box</td>
<td>时间序列数据会出问题</td>
</tr>
<tr>
<td>无多重共线性</td>
<td>面积和房间数不能完全相关</td>
<td>VIF、条件数</td>
<td>系数估计不稳定</td>
</tr>
</tbody>
</table>
</section>

<header>回归分析及其应用：金融视角下的统计学习</header>
<h2 id="%E5%9B%9E%E5%BD%92%E6%A8%A1%E5%9E%8B%E7%9A%84%E6%AD%A3%E5%88%99%E5%8C%96%E6%96%B9%E6%B3%95">回归模型的正则化方法</h2>
<p><strong>为什么需要正则化？</strong></p>
<blockquote>
<p>问题：过拟合、多重共线性、高维问题</p>
</blockquote>
<p><strong>正则化就像&quot;记忆限制&quot;</strong>：只记住重要细节，忽略无关细节</p>
<table>
<thead>
<tr>
<th>方法</th>
<th>生活比喻</th>
<th>效果</th>
<th>适用场景</th>
</tr>
</thead>
<tbody>
<tr>
<td>Ridge（L2）</td>
<td><strong>温和的老师</strong>：让所有学生都发言，但控制发言时间</td>
<td>系数缩小但不为0</td>
<td>多重共线性</td>
</tr>
<tr>
<td>Lasso（L1）</td>
<td><strong>严格的老师</strong>：只让最重要的学生发言，其他学生保持安静</td>
<td>有些系数变为0（特征选择）</td>
<td>高维稀疏</td>
</tr>
<tr>
<td>Elastic Net</td>
<td><strong>智慧的老师</strong>：既控制发言时间，又选择重要学生发言</td>
<td>结合两者优点</td>
<td>高维+共线性</td>
</tr>
</tbody>
</table>
</section>

<ul>
<li>不完全消除任何特征的影响</li>
<li>控制所有特征的影响力，防止某个特征过于强大</li>
<li>适用场景：特征数不多，共线性不严重</li>
</ul>
<p><strong>Lasso回归</strong>：</p>
<ul>
<li>自动进行<strong>特征选择</strong></li>
<li>不重要的特征系数变为0（完全忽略）</li>
<li>适用场景：特征数很多，想做特征选择</li>
</ul>

<header>回归分析及其应用：金融视角下的统计学习</header>
<h2 id="%E5%9B%9E%E5%BD%92%E6%A8%A1%E5%9E%8B%E7%9A%84%E9%99%8D%E7%BB%B4%E6%96%B9%E6%B3%95">回归模型的降维方法</h2>
<p><strong>为什么需要降维？</strong></p>
<blockquote>
<p>问题：特征多，样本少，多重共线性严重</p>
</blockquote>
<p><strong>降维就像&quot;信息压缩&quot;</strong>：把多个相关特征合并成几个核心特征</p>
<table>
<thead>
<tr>
<th>方法</th>
<th>生活比喻</th>
<th>原理</th>
<th>适用场景</th>
</tr>
</thead>
<tbody>
<tr>
<td>主成分回归（PCR）</td>
<td><strong>照片压缩</strong>：把多个特征合并成几个&quot;综合特征&quot;</td>
<td>PCA降维后回归</td>
<td>多重共线性严重</td>
</tr>
<tr>
<td>偏最小二乘（PLS）</td>
<td><strong>智能压缩</strong>：考虑最终目标来压缩</td>
<td>利用Y信息降维</td>
<td>预测为主、高维</td>
</tr>
<tr>
<td>Lasso</td>
<td><strong>特征筛选</strong>：只保留最重要的特征</td>
<td>L1正则化选特征</td>
<td>稀疏解、高维</td>
</tr>
<tr>
<td>逐步回归</td>
<td><strong>逐步淘汰</strong>：一轮轮淘汰不重要的特征</td>
<td>AIC/BIC准则</td>
<td>低维、解释性</td>
</tr>
</tbody>
</table>
</section>

<p><strong>定性响应变量回归</strong>：</p>
<ul>
<li><strong>样本量要求</strong>：每个参数至少需要10-20个样本（少数类样本）</li>
<li><strong>类别不平衡处理</strong>：权重调整、采样技术、阈值调整</li>
<li><strong>完全分离问题</strong>：正则化、Firth偏置校正</li>
</ul>
<p><strong>线性回归改进</strong>：</p>
<ul>
<li><strong>异方差处理</strong>：加权最小二乘、稳健标准误</li>
<li><strong>时间序列回归</strong>：Newey-West标准误</li>
</ul>
<p><strong>正则化与降维</strong>：</p>
<ul>
<li><strong>参数选择策略</strong>：交叉验证选择最优参数</li>
<li><strong>特征标准化</strong>：正则化方法需要特征标准化</li>
</ul>
</section>
